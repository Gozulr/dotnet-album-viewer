trigger:
- main


pool:
  name: AgentDummy


variables:
  buildConfiguration: 'Release'
  imageRepository: 'gozul/dotnet-album-viewer'
  dockerRegistryServiceConnection: 'DockerHub'
  sonarQubeServiceConnection: 'SonarQube'
  sonarProjectKey: 'dummy-project-key'
  sonarProjectName: 'dummy-project'
  imageTag: '$(Build.BuildId)'
  k8sNamespace: 'dummy-app'


stages:
- stage: AnalyzeBuild
  displayName: 'Analyze and Build'
  jobs:
  - job: HelloWorld
    displayName: 'Hola Mundo en job paralelo'
    strategy:
      matrix:
        job1: { INDEX: '1' }
        job2: { INDEX: '2' }
        job3: { INDEX: '3' }
        job4: { INDEX: '4' }
        job5: { INDEX: '5' }
        job6: { INDEX: '6' }
        job7: { INDEX: '7' }
        job8: { INDEX: '8' }
        job9: { INDEX: '9' }
        job10: { INDEX: '10' }
    steps:
    - powershell: |
        Write-Host "Hola Mundo $(INDEX)"
      displayName: 'Imprimir Hola Mundo'


  - job: DateFiles
    displayName: 'Crear 10 archivos con fecha'
    steps:
    - powershell: |
        New-Item -ItemType Directory -Force -Path outputfiles | Out-Null
        1..10 | ForEach-Object {
          $file = "outputfiles/file_$($_).txt"
          $content = "Archivo $_ - Fecha: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Set-Content -Path $file -Value $content
        }
        Get-ChildItem outputfiles | ForEach-Object {
          Write-Host "===== $($_.Name) ====="
          Get-Content $_.FullName
        }
      displayName: 'Crear e imprimir archivos'


  - job: SonarBuild
    displayName: 'SonarQube + Build .NET'
    steps:
    - checkout: self
      fetchDepth: 0


    - task: SonarQubePrepare@7
      inputs:
        SonarQube: '$(sonarQubeServiceConnection)'
        scannerMode: 'dotnet'
        projectKey: '$(sonarProjectKey)'
        projectName: '$(sonarProjectName)'
        extraProperties: |
          sonar.verbose=true

    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - powershell: |
        Write-Host "=== sonar-project.properties generado ==="
        Get-Content "$(Agent.BuildDirectory)\.sonarqube\out\sonar-project.properties"
      displayName: 'Dump sonar-project.properties'


    - powershell: |
         dotnet restore .\src\AlbumViewerNetCore\AlbumViewerNetCore.csproj
         dotnet build   .\src\AlbumViewerNetCore\AlbumViewerNetCore.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'Restore y Build'


    - task: SonarQubeAnalyze@7
      displayName: 'Run Code Analysis'


    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'
      displayName: 'Publish Quality Gate'


- stage: Dockerize
  displayName: 'Build and Push Image'
  dependsOn: AnalyzeBuild
  condition: succeeded()
  jobs:
  - job: DockerBuildPush
    displayName: 'Docker Build and Push'
    steps:
    - task: Docker@2
      displayName: 'Build and Push Docker image'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'docker/app/Dockerfile'
        tags: |
          $(imageTag)
          latest


- stage: Deploy
  displayName: 'Deploy to Minikube'
  dependsOn: Dockerize
  condition: succeeded()
  jobs:
  - job: K8sDeploy
    displayName: 'Apply Kubernetes manifests'
    steps:
    - powershell: |
        kubectl config current-context
        kubectl apply -f environment/namespace.yaml
        kubectl apply -f environment/deployment.yaml
        kubectl apply -f environment/service.yaml
        kubectl apply -f environment/ingress.yaml
        kubectl rollout status deployment/dotnet-album-viewer -n $(k8sNamespace) --timeout=180s
        kubectl get all -n $(k8sNamespace)
        kubectl get ingress -n $(k8sNamespace)
      displayName: 'Deploy manifests'