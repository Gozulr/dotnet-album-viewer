trigger:
- main

pool:
  name: AgentDummy

variables:
  buildConfiguration: 'Release'
  imageRepository: 'gozul/dotnet-album-viewer'
  dockerRegistryServiceConnection: 'DockerHub'
  sonarProjectKey: 'dummy-project-key'
  sonarProjectName: 'dummy-project'
  sonarHostUrl: 'http://localhost:9000'
  imageTag: '$(Build.BuildId)'
  k8sNamespace: 'dummy-app'

stages:
- stage: AnalyzeBuild
  displayName: 'Analyze and Build'
  jobs:
  - job: HelloWorld
    displayName: 'Hola Mundo en job paralelo'
    strategy:
      matrix:
        job1:  { INDEX: '1' }
        job2:  { INDEX: '2' }
        job3:  { INDEX: '3' }
        job4:  { INDEX: '4' }
        job5:  { INDEX: '5' }
        job6:  { INDEX: '6' }
        job7:  { INDEX: '7' }
        job8:  { INDEX: '8' }
        job9:  { INDEX: '9' }
        job10: { INDEX: '10' }
    steps:
    - powershell: |
        Write-Host "Hola Mundo $(INDEX)"
      displayName: 'Imprimir Hola Mundo'

  - job: DateFiles
    displayName: 'Crear 10 archivos con fecha'
    steps:
    - powershell: |
        New-Item -ItemType Directory -Force -Path outputfiles | Out-Null
        1..10 | ForEach-Object {
          $file = "outputfiles/file_$($_).txt"
          $content = "Archivo $_ - Fecha: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Set-Content -Path $file -Value $content
        }
        Get-ChildItem outputfiles | ForEach-Object {
          Write-Host "===== $($_.Name) ====="
          Get-Content $_.FullName
        }
      displayName: 'Crear e imprimir archivos'

  - job: SonarBuild
    displayName: 'SonarQube + Build .NET'
    steps:
    - checkout: self
      fetchDepth: 0

    - task: UseDotNet@2
      displayName: 'Instalar .NET SDK 8'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: PowerShell@2
      displayName: 'SonarScanner for .NET manual'
      inputs:
        targetType: 'inline'
        script: |
          dotnet tool install --global dotnet-sonarscanner --version 6.*
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

          # Escenario 1: análisis fallido (por ejemplo, usando una quality gate muy estricta o una exclusión incorrecta)
          # Puedes activar este bloque mediante condición o variable si lo quieres demostrar aparte.

          # Escenario 2: análisis exitoso
          dotnet sonarscanner begin `
            /k:"$(sonarProjectKey)" `
            /n:"$(sonarProjectName)" `
            /d:sonar.host.url="$(sonarHostUrl)" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.verbose=true

          dotnet restore .\src\AlbumViewerNetCore\AlbumViewerNetCore.csproj
          dotnet build .\src\AlbumViewerNetCore\AlbumViewerNetCore.csproj --configuration $(buildConfiguration) --no-restore

          dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)

- stage: Dockerize
  displayName: 'Build and Push Image'
  dependsOn: AnalyzeBuild
  condition: succeeded()
  jobs:
  - job: DockerBuildPush
    displayName: 'Docker Build and Push'
    steps:
    - task: Docker@2
      displayName: 'Build and Push Docker image'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'docker/app/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(imageTag)
          latest

- stage: Deploy
  displayName: 'Deploy to Minikube'
  dependsOn: Dockerize
  condition: succeeded()
  jobs:
  - job: K8sDeploy
    displayName: 'Apply Kubernetes manifests'
    steps:
    - powershell: |
        kubectl config current-context
        kubectl apply -f environment/namespace.yaml
        kubectl apply -f environment/deployment.yaml
        kubectl apply -f environment/service.yaml
        kubectl apply -f environment/ingress.yaml

        kubectl rollout status deployment/dotnet-album-viewer -n $(k8sNamespace) --timeout=180s
        kubectl get all -n $(k8sNamespace)
        kubectl get ingress -n $(k8sNamespace)
      displayName: 'Deploy manifests'