version: '3.2'

services:
  db:
    image: mysql:8.0
    container_name: albumviewer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: AlbumViewer
    ports:
      - "3306:3306"
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--skip_ssl"
    ]

  app:
    image: dockersamples/dotnet-album-viewer
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: albumviewer-app
    depends_on:
      - db
    ports:
      - "80:80"
    environment:
      - "Data:Provider=MySQL"
      - "Data:ConnectionString=Server=db;Port=3306;Database=AlbumViewer;User=root;Password=;SslMode=None"

networks:
  default:
    driver: bridge